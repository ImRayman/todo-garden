<script>
// ══════════════════════════════════════════════
// AUTH + PERSISTENCE
// ══════════════════════════════════════════════
const LS_KEY = 'tg_session'; // localStorage key
let sessionType = 'todo';

// ── Persistence helpers ──
function saveSession(type, data) {
  try { localStorage.setItem(LS_KEY, JSON.stringify({ type, data, ts: Date.now() })); } catch(e){}
}
function loadSession() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}
function clearSession() { try { localStorage.removeItem(LS_KEY); } catch(e){} }

function saveSelections() {
  try {
    localStorage.setItem('tg_sel', JSON.stringify({ garden: tdGardenId }));
  } catch(e){}
}

function showErr(m) { const e=document.getElementById('login-err'); e.textContent=m; e.style.display='block'; }
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-body').style.display = 'flex';
  resize(); startLoop();
}
function logout() {
  clearSession(); localStorage.removeItem('tg_sel');
  sessionType = null;
  location.reload();
}

// ══════════════════════════════════════════════════════
// MY TODO — local-only garden/task manager
// ══════════════════════════════════════════════════════

const TD_KEY     = 'tg_todo_data';
const TD_SEL_KEY = 'tg_todo_sel';

let tdData     = { gardens: [] };
let tdGardenId = null;

// ── Persist helpers ──
function tdLoad() {
  try { tdData = JSON.parse(localStorage.getItem(TD_KEY)) || { gardens:[] }; }
  catch(e) { tdData = { gardens:[] }; }
  // ensure gardens array exists (handles old data gracefully)
  if (!tdData.gardens) tdData = { gardens: [] };
}
function tdSave() {
  try { localStorage.setItem(TD_KEY, JSON.stringify(tdData)); } catch(e) {}
}
function tdSaveSel() {
  try { localStorage.setItem(TD_SEL_KEY, JSON.stringify({ garden: tdGardenId })); } catch(e) {}
}
function tdLoadSel() {
  try { return JSON.parse(localStorage.getItem(TD_SEL_KEY) || '{}'); } catch(e) { return {}; }
}
function tdUID() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
let _tdActiveTab = 'todo';
function tdSwitchTab(tab) {
  _tdActiveTab = tab;
  document.getElementById('tab-todo').classList.toggle('active', tab==='todo');
  document.getElementById('tab-done').classList.toggle('active', tab==='done');
  buildTray();
}

// ── Current garden accessor ──
function tdGetGarden() {
  if (!tdGardenId) return null;
  return tdData.gardens.find(g => g.id === tdGardenId) || null;
}

// ── Entry point ──
function loginTodo() {
  tdLoad();
  sessionType = 'todo';
  saveSession('todo', {});
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-body').style.display = 'flex';

  // hide bar elements not used in todo mode
  ['user-area','bar-chip-seeds','bar-chip-planted']
    .forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });

  // add sign-out to bar if not already there
  if (!document.getElementById('td-signout-btn')) {
    const bar = document.getElementById('bar');
    const btn = document.createElement('button');
    btn.id = 'td-signout-btn';
    btn.className = 'btn';
    btn.style.cssText = 'font-size:0.58rem;margin-left:auto';
    btn.textContent = 'sign out';
    btn.onclick = logout;
    bar.appendChild(btn);
  }

  // Auto-create default garden on first launch
  if (!tdData.gardens.length) {
    const g = { id: tdUID(), name: 'Todo Garden', tasks: [{ id: tdUID(), title: 'Motivational Seed 🌱', done: false, color: 'green' }] };
    tdData.gardens.push(g);
    tdSave();
  }

  // restore saved garden
  const sel = tdLoadSel();
  tdGardenId = sel.garden || null;
  if (!tdData.gardens.find(g => g.id === tdGardenId)) {
    tdGardenId = tdData.gardens[0]?.id || null;
  }

  tdRepopulateBar();
  tdApplyGarden();
  resize(); startLoop();
}

// ── Repopulate the garden title + dropdown ──
function tdRepopulateBar() {
  const garden = tdGetGarden();
  // Update title text
  const titleEl = document.getElementById('garden-title-text');
  if (titleEl) titleEl.textContent = garden ? garden.name : 'Select Garden';

  // hide delete button when only 1 garden
  const delBtn = document.getElementById('tray-del-garden');
  if (delBtn) delBtn.style.display = tdData.gardens.length > 1 ? '' : 'none';

  // Rebuild dropdown list
  tdRebuildDropdownList();
}

function tdRebuildDropdownList() {
  const list = document.getElementById('garden-dropdown-list');
  if (!list) return;
  list.innerHTML = '';
  tdData.gardens.forEach(g => {
    const item = document.createElement('div');
    item.className = 'garden-dropdown-item' + (g.id === tdGardenId ? ' active' : '');
    item.textContent = g.name;
    item.onclick = (e) => { e.stopPropagation(); tdSetGarden(g.id); tdCloseGardenDropdown(); };
    list.appendChild(item);
  });
}

// ── Garden dropdown toggle (debounced to avoid firing on dblclick) ──
let _gardenClickTimer = null;
function tdToggleGardenDropdown() {
  if (_gardenClickTimer) return; // already pending
  _gardenClickTimer = setTimeout(() => {
    _gardenClickTimer = null;
    const dd = document.getElementById('garden-dropdown');
    const chev = document.getElementById('garden-title-chevron');
    if (!dd) return;
    const isOpen = dd.style.display !== 'none';
    dd.style.display = isOpen ? 'none' : 'block';
    if (chev) chev.classList.toggle('open', !isOpen);
    if (!isOpen) tdRebuildDropdownList();
  }, 220);
}
function tdCloseGardenDropdown() {
  const dd = document.getElementById('garden-dropdown');
  const chev = document.getElementById('garden-title-chevron');
  if (dd) dd.style.display = 'none';
  if (chev) chev.classList.remove('open');
}

// ── Inline rename ──
function tdStartRename() {
  // cancel pending single-click (dropdown toggle)
  if (_gardenClickTimer) { clearTimeout(_gardenClickTimer); _gardenClickTimer = null; }
  tdCloseGardenDropdown();
  const garden = tdGetGarden(); if (!garden) return;
  document.getElementById('garden-title-row').style.display = 'none';
  const row = document.getElementById('garden-rename-row');
  const input = document.getElementById('garden-rename-input');
  row.style.display = 'flex';
  input.value = garden.name;
  setTimeout(() => { input.focus(); input.select(); }, 50);
}
function tdConfirmRename() {
  const garden = tdGetGarden(); if (!garden) return;
  const input = document.getElementById('garden-rename-input');
  const name = (input?.value || '').trim();
  if (name) { garden.name = name; tdSave(); }
  tdCancelRename();
  tdRepopulateBar();
}
function tdCancelRename() {
  document.getElementById('garden-rename-row').style.display = 'none';
  document.getElementById('garden-title-row').style.display = 'flex';
}

// ── Click-outside dismisses edit modes ──
document.addEventListener('mousedown', e => {
  // garden rename: click outside cancels
  const renameRow = document.getElementById('garden-rename-row');
  if (renameRow && renameRow.style.display !== 'none' && !renameRow.contains(e.target)) {
    tdCancelRename();
  }
  // task edit: click outside cancels
  if (_tdEditingTaskId) {
    const editInput = document.getElementById('td-edit-task-input');
    if (editInput && !editInput.closest('.todo-task')?.contains(e.target)) {
      tdCancelEditTask();
    }
  }
});

// ── Inline create helpers ──
function tdShowCreateGarden() {
  const c = document.getElementById('tray-create-garden');
  if(c) { c.style.display='flex'; setTimeout(()=>document.getElementById('tray-create-garden-input')?.focus(),50); }
}
function tdHideCreateGarden() {
  const c = document.getElementById('tray-create-garden'); if(c) c.style.display='none';
  const i = document.getElementById('tray-create-garden-input'); if(i) i.value='';
}
function tdConfirmCreateGarden() {
  const i = document.getElementById('tray-create-garden-input');
  const name = (i?.value||'').trim() || `Garden ${tdData.gardens.length+1}`;
  const g = { id: tdUID(), name, tasks: [{ id: tdUID(), title: 'Motivational Seed 🌱', done: false, color: 'green' }] };
  tdData.gardens.push(g); tdSave();
  tdGardenId = g.id;
  tdSaveSel(); tdRepopulateBar(); tdApplyGarden();
  tdHideCreateGarden();
  tdCloseGardenDropdown();
}

// ── Called whenever garden context changes — syncs seeds+garden+tray ──
// Track which garden's canvas is currently loaded in `planted`
let _tdLoadedGardenKey = null;
let _tdExpandedId = null;

function tdApplyGarden() {
  const garden = tdGetGarden();
  const gkey = gardenKey();

  if (!garden) {
    seeds = []; planted = [];
    _tdLoadedGardenKey = null;
    buildTray(); updateDropHint();
    document.getElementById('n-planted').textContent = 0;
    return;
  }

  const switching = _tdLoadedGardenKey !== gkey;

  if (switching) {
    // Save outgoing garden's live canvas before clearing
    if (_tdLoadedGardenKey) {
      try {
        const outData = planted.map(p => ({
          id: p.id, title: p.title, type: p.type, owner: p.owner,
          state: p.state, priority: p.priority, sprint: p.sprint, seed: p.seed,
          color: p.color, size: p.size, dueDate: p.dueDate || null,
          x: p.x, y: p.y, plantedAt: p.plantedAt
        }));
        localStorage.setItem(_tdLoadedGardenKey, JSON.stringify({ data: outData, ts: Date.now() }));
      } catch(e) {}
    }
    // Load this garden's canvas from storage
    planted = [];
    const savedPlants = loadGarden(gkey) || [];
    const plantedIds  = new Set(savedPlants.map(p => p.id));
    garden.tasks.forEach(t => { if (plantedIds.has(t.id)) t.done = true; });
    tdSave();
    planted = savedPlants.map(p => {
      const task = garden.tasks.find(t => t.id === p.id);
      if (!task) return null;
      return {
        id: p.id, title: task.title, type: 'task', owner: 'Me',
        state: 'Done', priority: 'medium', sprint: garden.name,
        seed: Math.abs(p.id.split('').reduce((a,c) => a + c.charCodeAt(0), 0)) || 1,
        color: p.color || task.color || null,
        size: p.size || task.size || 'medium',
        dueDate: p.dueDate || task.dueDate || null,
        x: p.x, y: p.y, plantedAt: p.plantedAt || (Date.now() - 10000), planted: true
      };
    }).filter(Boolean);
    _tdLoadedGardenKey = gkey;
  } else {
    // Same garden — just sync done flags from live planted (don't touch planted array)
    const livePlantedIds = new Set(planted.map(p => p.id));
    garden.tasks.forEach(t => { if (livePlantedIds.has(t.id)) t.done = true; });
  }

  // Rebuild seeds = undone tasks
  seeds = garden.tasks
    .filter(t => !t.done)
    .map((t, i) => ({
      id: t.id, title: t.title, type: 'task', owner: 'Me',
      state: 'Todo', priority: 'medium', sprint: garden.name,
      seed: Math.abs(t.id.split('').reduce((a,c) => a + c.charCodeAt(0), 0)) || i+1,
      color: t.color || null,
      size: t.size || 'medium',
      planted: false
    }));

  cancelPlanting();
  document.getElementById('n-planted').textContent = planted.length;
  updateDropHint();
  buildTray();
}

// ── Convenience: set garden (user picked from dropdown) ──
function tdSetGarden(id) {
  tdGardenId = id || null;
  tdSaveSel();
  tdRepopulateBar();
  tdApplyGarden();
}

// ── CRUD: Garden ──
function tdDeleteGarden() {
  if (tdData.gardens.length <= 1) return; // can't delete last garden
  const garden = tdGetGarden(); if (!garden) return;
  if (!confirm(`Delete "${garden.name}" and all its tasks?`)) return;
  tdData.gardens = tdData.gardens.filter(g => g.id !== tdGardenId);
  tdGardenId = tdData.gardens[0]?.id || null;
  planted = []; tdSave();
  tdSaveSel(); tdRepopulateBar(); tdApplyGarden();
}

// ── CRUD: Task (called from tray input + tray card buttons) ──
function tdTrayAddTask() {
  const input = document.getElementById('tray-task-input');
  const title = (input?.value || '').trim();
  if (!title) { input?.focus(); return; }
  const garden = tdGetGarden();
  if (!garden) return;
  const newId = tdUID();
  garden.tasks.push({ id: newId, title, done: false, color: 'red' });
  _tdNewTaskIds.add(newId);
  tdSave();
  input.value = '';
  input.focus();
  tdApplyGarden();   // re-sync seeds + rebuild tray
}
function tdToggleTask(taskId, done) {
  const garden = tdGetGarden(); if (!garden) return;
  const task = garden.tasks.find(t => t.id === taskId); if (!task) return;
  task.done = done;
  if (!done) planted = planted.filter(p => p.id !== taskId);
  tdSave(); tdApplyGarden(); saveGarden();
}
function tdDeleteTask(taskId) {
  const garden = tdGetGarden(); if (!garden) return;
  if (selectedSeed?.id === taskId) cancelPlanting();
  garden.tasks = garden.tasks.filter(t => t.id !== taskId);
  planted = planted.filter(p => p.id !== taskId);
  tdSave(); tdApplyGarden(); saveGarden();
}

// ── Inline task title editing ──
let _tdEditingTaskId = null;
let _tdNewTaskIds = new Set();  // IDs of tasks just added (for slide-in animation)
function tdStartEditTask(taskId) {
  _tdEditingTaskId = taskId;
  _tdExpandedId = null; // collapse expanded panel while editing
  buildTray();
}
function tdConfirmEditTask(taskId) {
  const input = document.getElementById('td-edit-task-input');
  const garden = tdGetGarden(); if (!garden) return;
  const task = garden.tasks.find(t => t.id === taskId); if (!task) return;
  const name = (input?.value || '').trim();
  if (name) { task.title = name; tdSave(); }
  _tdEditingTaskId = null;
  tdApplyGarden();
}
function tdCancelEditTask() {
  _tdEditingTaskId = null;
  buildTray();
}

// legacy stubs
function tdAddTask()   {}
function tdBackToTodo() {}
function tdGardenMode() {}
function tdSyncSeeds()  {}
function tdLoadGarden() {}
function tdRefreshBar() { tdRepopulateBar(); }




function updateDropHint() {
  document.getElementById('drop-hint').style.display = planted.length === 0 ? 'block' : 'none';
}

function setStatus(s,t) {
  document.getElementById('status-row').style.display = 'flex';
  document.getElementById('sdot').className = 'sdot '+s;
  document.getElementById('stxt').textContent = t;
}

// ══════════════════════════════════════
// GARDEN PERSISTENCE
// ══════════════════════════════════════
function gardenKey() {
  return `tg_garden::todo::${tdGardenId}`;
}

function saveGarden() {
  try {
    const key = gardenKey();
    const data = planted.map(p => ({
      id: p.id, title: p.title, type: p.type, owner: p.owner,
      state: p.state, priority: p.priority, sprint: p.sprint, seed: p.seed,
      color: p.color || null, size: p.size || null, dueDate: p.dueDate || null,
      x: p.x, y: p.y, plantedAt: p.plantedAt
    }));
    localStorage.setItem(key, JSON.stringify({ data, ts: Date.now() }));
  } catch(e) { console.warn('Garden save failed', e); }
}

function loadGarden(key) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return parsed.data || null;
  } catch(e) { return null; }
}

function clearGarden(key) {
  try { localStorage.removeItem(key); } catch(e) {}
}

// list all saved garden keys (for showing save indicator)
function hasSavedGarden(key) {
  try { return localStorage.getItem(key) !== null; } catch(e) { return false; }
}


const cv = document.getElementById('gc');
const ctx = cv.getContext('2d');
const ttEl = document.getElementById('tt');
const seedCursor = document.getElementById('seed-cursor');

let seeds = [], planted = [];
let raf = null, T = 0;
let selectedSeed = null;
let mouseX = -999, mouseY = -999;
const OWN_COLORS = ['#fd7f7f','#7fb8fd','#67cf53','#a37ffd','#f0d146','#38b8a0','#fd9d49','#7878d4','#c8d840','#e86898'];
const ownerColorMap = {}; let ownerCI = 0;
function ownerColor(n) {
  if (!n||n==='Unassigned') return '#b0ada4';
  if (!ownerColorMap[n]) { ownerColorMap[n]=OWN_COLORS[ownerCI%OWN_COLORS.length]; ownerCI++; }
  return ownerColorMap[n];
}
function initials(n) { if(!n||n==='Unassigned')return'?'; return n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase(); }
function shortN(n) { if(!n||n==='Unassigned')return''; const p=n.split(' '); return p.length>1?p[0]+' '+p[p.length-1][0]+'.':p[0]; }
function srng(s) { let r=(s*16807+49297)%2147483647; return()=>{ r=(r*16807)%2147483647; return(r-1)/2147483646; }; }
const PH = { critical:1.0, high:0.76, medium:0.54, low:0.36 };
const SZ = { small:0.62, medium:1.0, large:1.48 };  // task size multipliers for flower height

function hexA(hex,a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function resize() {
  const w = cv.parentElement;
  cv.width = w.clientWidth; cv.height = w.clientHeight;
  draw();
}
window.addEventListener('resize', resize);

function startLoop() {
  if (raf) return;
  (function loop(){ T+=0.007; draw(); raf=requestAnimationFrame(loop); })();
}

function draw() {
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#f8f7f4'; ctx.fillRect(0,0,W,H);

  // ── camera transform ──
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(cam.zoom, cam.zoom);
  ctx.translate(-cam.x, -cam.y);

  // visible world bounds
  const vx0 = cam.x - W/(2*cam.zoom), vy0 = cam.y - H/(2*cam.zoom);
  const vx1 = cam.x + W/(2*cam.zoom), vy1 = cam.y + H/(2*cam.zoom);

  const activeSeed = selectedSeed || _tdDragPreview?.seed || null;
  const activeMX   = _tdDragPreview ? _tdDragPreview.x : mouseX;
  const activeMY   = _tdDragPreview ? _tdDragPreview.y : mouseY;

  if (activeSeed) {
    // ── PLANT MODE: subtle world grid ──
    const sp = 60;
    ctx.strokeStyle = 'rgba(0,0,0,0.05)';
    ctx.lineWidth = 0.5 / cam.zoom;
    ctx.setLineDash([2/cam.zoom, 6/cam.zoom]);
    const x0g = Math.floor(vx0/sp)*sp;
    for (let x=x0g; x<=vx1+sp; x+=sp) {
      ctx.beginPath(); ctx.moveTo(x,vy0-sp); ctx.lineTo(x,vy1+sp); ctx.stroke();
    }
    const y0g = Math.floor(vy0/sp)*sp;
    for (let y=y0g; y<=vy1+sp; y+=sp) {
      ctx.beginPath(); ctx.moveTo(vx0-sp,y); ctx.lineTo(vx1+sp,y); ctx.stroke();
    }
    ctx.setLineDash([]);
    for (let x=x0g; x<=vx1+sp; x+=sp)
      for (let y=y0g; y<=vy1+sp; y+=sp) {
        ctx.beginPath(); ctx.arc(x,y,1.2/cam.zoom,0,Math.PI*2);
        ctx.fillStyle='rgba(0,0,0,0.1)'; ctx.fill();
      }
    // proximity glow
    const gsp = sp;
    const snapX = Math.round(activeMX/gsp)*gsp;
    const snapY = Math.round(activeMY/gsp)*gsp;
    const dist  = Math.hypot(activeMX-snapX, activeMY-snapY);
    const maxDist = gsp*0.7;
    if (dist < maxDist && activeMX > -9000) {
      const glow = 1 - dist/maxDist;
      const col = ownerColor(activeSeed.owner);
      const gr = ctx.createRadialGradient(snapX,snapY,0,snapX,snapY,gsp*0.6);
      gr.addColorStop(0, hexA(col, 0.14*glow));
      gr.addColorStop(1, hexA(col, 0));
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(snapX,snapY,gsp*0.6,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle=hexA(col,0.45*glow); ctx.lineWidth=1/cam.zoom;
      ctx.beginPath(); ctx.arc(snapX,snapY,gsp*0.25,0,Math.PI*2); ctx.stroke();
    }
  } else {
    // ── NORMAL MODE: world-space dot grid ──
    const sp = 36;
    const x0g = Math.floor(vx0/sp)*sp, y0g = Math.floor(vy0/sp)*sp;
    for (let x=x0g; x<=vx1+sp; x+=sp)
      for (let y=y0g; y<=vy1+sp; y+=sp) {
        ctx.beginPath(); ctx.arc(x, y, 0.9/cam.zoom, 0, Math.PI*2);
        ctx.fillStyle='rgba(0,0,0,0.055)'; ctx.fill();
      }
  }

  // ── world boundary indicator ──
  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 2/cam.zoom;
  ctx.setLineDash([8/cam.zoom, 8/cam.zoom]);
  ctx.strokeRect(-WORLD_W/2, -WORLD_H/2, WORLD_W, WORLD_H);
  ctx.setLineDash([]);

  // ── draw all plants ──
  stepSprings();
  // held plant wiggles nervously as ring fills
  if (holdState && holdState.plant) {
    const prog = uprooting();
    if (prog < 1 && Math.random() < 0.18) kickSpring(holdState.plant, 0.15 + prog * 0.4);
  }
  planted.forEach(p => drawPlant(p));
  updateAndDrawConfetti();

  ctx.restore(); // end camera transform

  // hold ring drawn in screen space
  drawHoldRing();

  // ── mini HUD ──
  drawHUD();
}

function drawHUD() {
  cv._hudBtns = [];
}

cv.addEventListener('click', e => {
  if (!cv._hudBtns) return;
  const rc = cv.getBoundingClientRect();
  const cx = e.clientX-rc.left, cy = e.clientY-rc.top;
  for (const btn of cv._hudBtns) {
    if (cx>=btn.x && cx<=btn.x+btn.w && cy>=btn.y && cy<=btn.y+btn.h) {
      btn.fn(); return;
    }
  }
});

// Flower design — order: stem → leaves → shadow → petals → head+face → grass → label
function drawPlant(p) {
  const _taskCol = p.color ? (()=>{const c=TD_COLORS?.find(c=>c.id===p.color);return c?.hex||null;})() : null;
  const col     = _taskCol || ownerColor(p.owner);
  const rr      = srng(p.seed);
  const BASE    = Math.min(cv.width, cv.height) * 0.16 / cam.zoom;
  const elapsed = (Date.now() - p.plantedAt) / 1000;
  if (elapsed <= 0.01) return;

  // Size controls stem length only — flower head stays same scale
  const STEM_SZ = { small: 0.55, medium: 1.0, large: 1.7 };
  const stemScale = STEM_SZ[p.size || 'medium'] || 1.0;

  const maxH    = BASE * (PH[p.priority]||0.54) * stemScale * (0.8 + rr()*0.4);
  const headBase = BASE * 0.54 * (0.8 + rr()*0.4);

  // Due date: fade out and disappear if overdue
  let dueFade = 1.0;
  if (p.dueDate) {
    const dueMs = new Date(p.dueDate + 'T23:59:59').getTime();
    const overMs = Date.now() - dueMs;
    if (overMs > 0) {
      const fadeDur = 24 * 3600 * 1000;
      dueFade = Math.max(0, 1 - overMs / fadeDur);
      if (dueFade <= 0) return;
    }
  }

  const stemW    = Math.max(2, headBase * 0.045);
  const headR    = headBase * 0.22;
  const petalR   = headR * 0.50;
  const petalDist= headR * 0.88;
  const np       = 8;
  const numBlades= 3 + Math.floor(rr() * 2);

  const petalEnd   = 0.68 + np * 0.055;
  const grassStart = petalEnd + 0.06;

  const stemProg = Math.min(1, elapsed / 0.40);
  const stemH    = maxH * pop(stemProg);

  const ambientSway = Math.sin(T*(0.4+rr()*0.6)+(p.seed%100)) * 2.8*(Math.PI/180)
                      * Math.min(1, Math.max(0,(elapsed-0.55)*4));

  const pts = chainPoints(p, stemH, ambientSway);
  const tip = pts[pts.length - 1];
  const chain = getChain(p);
  const tipSeg = chain[chain.length - 1];
  const flowerLean = ambientSway + tipSeg.angle;

  ctx.save();
  if (dueFade < 1) ctx.globalAlpha = dueFade;
  ctx.translate(p.x, p.y);

  // ── 1. STEM — simple colored line to tip ──
  ctx.strokeStyle = col;
  ctx.lineWidth = stemW;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  if (pts.length <= 2) {
    ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
  } else {
    for (let i = 1; i < pts.length - 1; i++) {
      const mx = (pts[i].x + pts[i+1].x) / 2;
      const my = (pts[i].y + pts[i+1].y) / 2;
      ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
    }
    ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
  }
  ctx.stroke();
  ctx.beginPath();

  // ── 2. LEAVES — task colored, at 75% down stem (near base) ──
  const leafProg = Math.max(0, Math.min(1, (elapsed-0.35)/0.2));
  if (leafProg > 0 && stemH > maxH*0.15) {
    const lh = headBase*0.28, lw = headBase*0.12;
    const lsc = pop(leafProg);
    const leafIdx = (pts.length-1) * 0.28; // 28% from tip = 72% from base
    const li = Math.floor(leafIdx), lf = leafIdx - li;
    const leafPt = {
      x: pts[li].x + (pts[li+1]?.x - pts[li].x || 0) * lf,
      y: pts[li].y + (pts[li+1]?.y - pts[li].y || 0) * lf
    };
    const leafAngle = chain[Math.min(li, chain.length-1)].angle + ambientSway;
    ctx.fillStyle = col;
    ctx.save(); ctx.translate(leafPt.x, leafPt.y); ctx.rotate(-1.0 + leafAngle*0.6); ctx.scale(lsc,lsc); pointyLeaf(lw,lh); ctx.restore();
    ctx.save(); ctx.translate(leafPt.x, leafPt.y); ctx.rotate( 1.0 + leafAngle*0.6); ctx.scale(lsc,lsc); pointyLeaf(lw,lh); ctx.restore();
  }

  // ── flower group at chain tip ──
  ctx.save();
  ctx.translate(tip.x, tip.y);
  ctx.rotate(flowerLean);

  const cp = Math.max(0, Math.min(1, (elapsed-0.55)/0.13));
  const cr = headR * 0.88;
  const shOx = headR * 0.2, shOy = headR * 0.25;

  // ── 3. PETAL SHADOWS ──
  {
    const prevA = ctx.globalAlpha;
    ctx.globalAlpha = prevA * 0.2;
    ctx.fillStyle = '#1a5039';
    for (let i = 0; i < np; i++) {
      const pp = Math.max(0, Math.min(1, (elapsed - (0.68+i*0.055)) / 0.11));
      if (pp <= 0) continue;
      const psc = pop(pp);
      const a = (i/np)*Math.PI*2 - Math.PI/2;
      ctx.save();
      ctx.translate(Math.cos(a)*petalDist + shOx, Math.sin(a)*petalDist + shOy);
      ctx.scale(psc, psc);
      ctx.beginPath(); ctx.arc(0, 0, petalR, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = prevA;
  }

  // ── 4. PETALS — 8 circles on top of shadows ──
  for (let i = 0; i < np; i++) {
    const pp = Math.max(0, Math.min(1, (elapsed - (0.68+i*0.055)) / 0.11));
    if (pp <= 0) continue;
    const psc = pop(pp);
    const a = (i/np)*Math.PI*2 - Math.PI/2;
    ctx.save();
    ctx.translate(Math.cos(a)*petalDist, Math.sin(a)*petalDist);
    ctx.scale(psc, psc);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(0, 0, petalR, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── 5. BASEHEAD — solid task color, on top of petals ──
  if (cp > 0) {
    const csc = pop(cp);
    ctx.save(); ctx.scale(csc, csc);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(0, 0, cr, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── 6. CENTER HEAD + FACE — on top of basehead ──
  if (cp > 0) {
    const csc = pop(cp);
    ctx.save(); ctx.scale(csc, csc);

    // White head with 20% alpha (on top of basehead)
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath(); ctx.arc(0, 0, cr, 0, Math.PI*2); ctx.fill();

    if (cp >= 1) {
      const mouseOnCanvas = mouseX > -900;
      const BASE_F = Math.min(cv.width, cv.height) * 0.16 / cam.zoom;
      const lookRadius = BASE_F * 3.5;

      // surprise
      const surpriseAge = (Date.now() - lastPlantTime) / 1000;
      const surpriseDur = 0.55;
      const isSurprised = surpriseAge < surpriseDur && p.plantedAt < lastPlantTime - 100;
      const surpriseT   = isSurprised ? Math.max(0, 1 - surpriseAge / surpriseDur) : 0;

      // pupil direction
      let pupilDx = 0, pupilDy = 0;
      let lookT = 0;
      if (isSurprised && mouseOnCanvas) {
        const cosL = Math.cos(-flowerLean), sinL = Math.sin(-flowerLean);
        const dx = lastPlantPos.x - (p.x + tip.x);
        const dy = lastPlantPos.y - (p.y + tip.y);
        const lx = cosL*dx - sinL*dy, ly = sinL*dx + cosL*dy;
        const d = Math.hypot(lx, ly) || 1;
        const shift = cr * 0.22 * surpriseT;
        pupilDx = (lx/d) * shift;
        pupilDy = (ly/d) * shift;
        lookT = surpriseT;
      } else if (mouseOnCanvas) {
        const worldDist = Math.hypot(mouseX - (p.x + tip.x), mouseY - (p.y + tip.y));
        lookT = worldDist > lookRadius ? 0 : Math.min(1, worldDist / (lookRadius * 0.6));
        if (lookT > 0) {
          const cosL = Math.cos(-flowerLean), sinL = Math.sin(-flowerLean);
          const dx = mouseX - (p.x + tip.x), dy = mouseY - (p.y + tip.y);
          const lx = cosL*dx - sinL*dy, ly = sinL*dx + cosL*dy;
          const d = Math.hypot(lx, ly) || 1;
          pupilDx = (lx/d) * cr * 0.22 * lookT;
          pupilDy = (ly/d) * cr * 0.22 * lookT;
        }
      }

      // Face proportions — eyes touching, centered
      const eyeR   = cr * 0.28;
      const eyeOff = eyeR * 1.05; // just touching
      const pupilR = eyeR * 0.50;
      const eyeY   = -cr * 0.08;

      const eyeScaleR = 1 + surpriseT * 0.55;

      // blink
      if (!p._blinkT) p._blinkT = (p.seed * 0.37) % 5;
      p._blinkT += 0.016;
      const blinkCycle = 3 + (p.seed % 7) * 0.28;
      const blinkPhase = p._blinkT % blinkCycle;
      const isBlinking = !isSurprised && blinkPhase < 0.13;
      const blinkScaleY = isBlinking ? Math.max(0.04, 1 - (blinkPhase / 0.065)) : 1;
      const eyeScaleY = blinkScaleY * eyeScaleR;

      // Eyes — white sclera
      ctx.fillStyle = '#fff';
      ctx.save(); ctx.translate(-eyeOff, eyeY); ctx.scale(eyeScaleR, eyeScaleY);
      ctx.beginPath(); ctx.arc(0, 0, eyeR, 0, Math.PI*2); ctx.fill(); ctx.restore();
      ctx.save(); ctx.translate( eyeOff, eyeY); ctx.scale(eyeScaleR, eyeScaleY);
      ctx.beginPath(); ctx.arc(0, 0, eyeR, 0, Math.PI*2); ctx.fill(); ctx.restore();

      // Pupils — #1a5039
      ctx.fillStyle = '#1a5039';
      ctx.save(); ctx.translate(-eyeOff + pupilDx, eyeY + pupilDy); ctx.scale(eyeScaleR, eyeScaleY);
      ctx.beginPath(); ctx.arc(0, 0, pupilR, 0, Math.PI*2); ctx.fill(); ctx.restore();
      ctx.save(); ctx.translate( eyeOff + pupilDx, eyeY + pupilDy); ctx.scale(eyeScaleR, eyeScaleY);
      ctx.beginPath(); ctx.arc(0, 0, pupilR, 0, Math.PI*2); ctx.fill(); ctx.restore();

      // Mouth — white smile with round caps
      const isHovered = hoveredPlant === p;
      const smileTarget = isSurprised ? -0.3 : (isHovered ? 1 : 0.35);
      if (!p._smile) p._smile = 0.35;
      p._smile += (smileTarget - p._smile) * (isSurprised ? 0.25 : 0.10);

      if (isSurprised && surpriseT > 0.3) {
        const oR = cr * (0.13 + surpriseT * 0.11);
        const oY = cr * 0.42;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.ellipse(0, oY, oR * 0.75, oR, 0, 0, Math.PI*2); ctx.fill();
      } else {
        const smileW = cr * (0.28 + p._smile * 0.20);
        const smileY = cr * (0.34 + p._smile * 0.06);
        const smileD = cr * (0.10 + p._smile * 0.18);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = cr * 0.12;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-smileW, smileY);
        ctx.quadraticCurveTo(0, smileY + smileD, smileW, smileY);
        ctx.stroke();
      }
    }

    ctx.restore();
  }

  ctx.restore(); // end flower group

  // ── 6. GRASS — task colored rectangles at angles, spread around base ──
  for (let i = 0; i < numBlades; i++) {
    const bp = Math.max(0, Math.min(1, (elapsed-(grassStart+i*0.06))/0.15));
    if (bp <= 0) continue;
    const bsc = pop(bp);
    const bx    = (rr()-0.5)*maxH*0.85;
    const by    = (rr()-0.5)*maxH*0.25;
    const bh    = maxH*(0.10+rr()*0.12)*bsc;
    const bw    = stemW*(1.2+rr()*0.8);
    const btilt = (rr()-0.5)*1.1;
    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(btilt);
    ctx.fillStyle = col;
    ctx.fillRect(-bw/2, -bh, bw, bh);
    ctx.restore();
  }

  ctx.restore(); // end p.x,p.y

  // label (task title)
  const lblStart = grassStart + numBlades*0.06 + 0.1;
  if (elapsed > lblStart) {
    const lop = Math.min(1,(elapsed-lblStart)/0.15);
    const fs = Math.max(7, Math.min(10, cv.width*0.007/cam.zoom));
    const label = p.title;
    if (label) {
      ctx.save();
      ctx.globalAlpha = lop*0.62;
      ctx.font=`400 ${fs}px 'DM Mono',monospace`;
      ctx.fillStyle='#444'; ctx.textAlign='center';
      const maxW = 80 / cam.zoom;
      let txt = label;
      while (txt.length > 4 && ctx.measureText(txt).width > maxW) txt = txt.slice(0,-1);
      if (txt.length < label.length) txt += '…';
      ctx.fillText(txt, p.x, p.y+fs+5);
      ctx.restore();
    }
  }
}

function pop(t) {
  if (t<=0) return 0; if (t>=1) return 1;
  return t<0.55 ? (t/0.55)*1.28 : 1.28-0.28*((t-0.55)/0.45);
}

function pointyLeaf(w, h) {
  // leaf with pointy tip — bezier curves
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo( w*1.2, -h*0.25,  w*0.9, -h*0.75,  0, -h);
  ctx.bezierCurveTo(-w*0.9, -h*0.75, -w*1.2, -h*0.25,  0,  0);
  ctx.fill();
}

function roundRect(ctx2, x, y, w, h, r) {
  r = Math.min(r, Math.abs(h)/2, Math.abs(w)/2);
  const x2 = x + w, y2 = y + h;
  ctx2.beginPath();
  ctx2.moveTo(x+r, y);
  ctx2.lineTo(x2-r, y);  ctx2.arc(x2-r, y+r,  r, -Math.PI/2, 0);
  ctx2.lineTo(x2,  y2-r); ctx2.arc(x2-r, y2-r, r, 0, Math.PI/2);
  ctx2.lineTo(x+r, y2);  ctx2.arc(x+r,  y2-r, r, Math.PI/2, Math.PI);
  ctx2.lineTo(x,   y+r);  ctx2.arc(x+r,  y+r,  r, Math.PI, -Math.PI/2);
  ctx2.closePath();
}

function darken(hex, amt) {
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,Math.floor(r*(1-amt)))},${Math.max(0,Math.floor(g*(1-amt)))},${Math.max(0,Math.floor(b*(1-amt)))})`;
}
function lighten(hex, amt) {
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,Math.floor(r+(255-r)*amt))},${Math.min(255,Math.floor(g+(255-g)*amt))},${Math.min(255,Math.floor(b+(255-b)*amt))})`;
}

let cam = { x: 0, y: 0, zoom: 1 };
const WORLD_W = 3200, WORLD_H = 2000;
let isPanning = false, panStart = { x:0, y:0 }, camStart = { x:0, y:0 };

function screenToWorld(sx, sy) {
  const rc = cv.getBoundingClientRect();
  return {
    x: (sx - rc.left - cv.width/2) / cam.zoom + cam.x,
    y: (sy - rc.top  - cv.height/2) / cam.zoom + cam.y
  };
}
function worldToScreen(wx, wy) {
  return {
    x: (wx - cam.x) * cam.zoom + cv.width/2,
    y: (wy - cam.y) * cam.zoom + cv.height/2
  };
}
function clampCam() {
  const hw = cv.width/(2*cam.zoom), hh = cv.height/(2*cam.zoom);
  cam.x = Math.max(-WORLD_W/2+hw, Math.min(WORLD_W/2-hw, cam.x));
  cam.y = Math.max(-WORLD_H/2+hh, Math.min(WORLD_H/2-hh, cam.y));
}

// ── HOLD TO UPROOT ──
// State
let holdState = null; // { plant, startTime, screenX, screenY } while holding
const HOLD_DURATION = 600; // ms to fill the ring

function hitTestPlant(wx, wy) {
  if (!planted.length) return null;
  const BASE = Math.min(cv.width, cv.height) * 0.16 / cam.zoom;
  const STEM_SZ = { small: 0.55, medium: 1.0, large: 1.7 };
  for (const p of planted) {
    const rr2 = srng(p.seed);
    const stemScale = STEM_SZ[p.size || 'medium'] || 1.0;
    const maxH = BASE*(PH[p.priority]||0.54)*stemScale*(0.8+rr2()*0.4);
    const headBase = BASE * 0.54 * (0.8+rr2()*0.4);
    const headR = headBase*0.22;
    const elapsed = (Date.now()-p.plantedAt)/1000;
    const stemH = maxH * pop(Math.min(1, elapsed/0.40));
    if (Math.hypot(wx-p.x, wy-(p.y-stemH)) < headR*1.7) return p;
  }
  return null;
}

function uprooting() {
  if (!holdState) return 0;
  return Math.min(1, (Date.now() - holdState.startTime) / HOLD_DURATION);
}

function drawHoldRing() {
  if (!holdState) return;
  const prog = uprooting();

  // fire uproot the instant ring completes — enter tooltip drag mode
  if (prog >= 1 && !holdState.fired) {
    holdState.fired = true;
    holdState.uprooted = true;
    const p = holdState.plant;
    const screenPos = worldToScreen(p.x, p.y);
    uprootPlant(p);
    // enter tooltip drag mode (reuse the same flow as task card → canvas)
    _uprootDrag = { seedId: p.id, startScreenX: screenPos.x, startScreenY: screenPos.y };
    _uprootDragTip = null;
    holdState = null;
    cv.style.cursor = 'grabbing';
    return;
  }

  const sc = worldToScreen(holdState.plant.x, holdState.plant.y);
  const sx = sc.x, sy = sc.y;

  const BASE = Math.min(cv.width, cv.height) * 0.16 / cam.zoom;
  const rr2 = srng(holdState.plant.seed);
  const _stemSz = {small:0.55,medium:1.0,large:1.7}[holdState.plant.size||'medium']||1.0;
  const maxH = BASE*(PH[holdState.plant.priority]||0.54)*_stemSz*(0.8+rr2()*0.4);
  const headR = maxH * 0.22 * cam.zoom; // screen-space radius
  const ringR = headR * 1.55;

  ctx.save();
  ctx.setTransform(1,0,0,1,0,0); // screen space

  // soft bg track
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(sx, sy - maxH * cam.zoom, ringR, 0, Math.PI*2);
  ctx.stroke();

  // progress arc — color matches the flower
  const _hpc = holdState.plant.color ? (()=>{const c=TD_COLORS?.find(c=>c.id===holdState.plant.color);return c?.hex||null;})() : null;
  const col = _hpc || ownerColor(holdState.plant.owner);
  ctx.strokeStyle = col;
  ctx.lineWidth = 3.5;
  ctx.beginPath();
  ctx.arc(sx, sy - maxH * cam.zoom, ringR,
    -Math.PI/2, -Math.PI/2 + prog * Math.PI*2);
  ctx.stroke();

  // pulse dot at arc tip
  if (prog > 0 && prog < 1) {
    const a = -Math.PI/2 + prog * Math.PI*2;
    const dx = Math.cos(a) * ringR, dy = Math.sin(a) * ringR;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(sx + dx, sy - maxH*cam.zoom + dy, 4, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

// ── pan + hold mouse events ──
// After hold ring completes, enter tooltip drag mode
let _uprootDrag = null;        // { seedId } — active uproot drag
let _uprootDragTip = null;     // tooltip DOM element during uproot drag
let _uprootPlaceholder = null; // placeholder gap in task list
let _uprootCard = null;        // hidden task card in list

cv.addEventListener('mousedown', e => {
  if (selectedSeed) return;
  const w = screenToWorld(e.clientX, e.clientY);
  const hit = hitTestPlant(w.x, w.y);
  if (hit) {
    holdState = { plant: hit, startTime: Date.now(), screenX: e.clientX, screenY: e.clientY };
    cv.style.cursor = 'pointer';
    return;
  }
  isPanning = true;
  panStart = { x: e.clientX, y: e.clientY };
  camStart = { x: cam.x, y: cam.y };
  cv.style.cursor = 'grabbing';
});

document.addEventListener('mouseup', e => {
  if (_uprootDrag) {
    // clean up tooltip
    if (_uprootDragTip && _uprootDragTip.parentNode) _uprootDragTip.parentNode.removeChild(_uprootDragTip);
    _uprootDragTip = null;
    _tdDragPreview = null;
    const tray = document.querySelector('.tray');
    const trayRect = tray?.getBoundingClientRect();
    const overTray = trayRect && e.clientX >= trayRect.left && e.clientX <= trayRect.right &&
                     e.clientY >= trayRect.top  && e.clientY <= trayRect.bottom;
    if (overTray) {
      // dropped on tray → show card at placeholder position, save order
      if (_uprootCard && _uprootPlaceholder && _uprootPlaceholder.parentNode) {
        _uprootPlaceholder.parentNode.insertBefore(_uprootCard, _uprootPlaceholder);
        _uprootCard.style.display = '';
      }
      // read new order from DOM
      const scroll = document.getElementById('tray-scroll');
      const garden = tdGetGarden();
      if (scroll && garden) {
        const newOrder = [...scroll.querySelectorAll('.todo-task[data-tid]')].map(c => c.dataset.tid);
        const undone = garden.tasks.filter(t => !t.done);
        const done = garden.tasks.filter(t => t.done);
        const reordered = newOrder.map(id => undone.find(t => t.id === id)).filter(Boolean);
        garden.tasks = [...reordered, ...done];
        tdSave();
      }
      if (_uprootPlaceholder?.parentNode) _uprootPlaceholder.parentNode.removeChild(_uprootPlaceholder);
      _uprootPlaceholder = null; _uprootCard = null; _uprootDrag = null;
      cancelPlanting();
    } else {
      // dropped on canvas → replant at new position
      if (_uprootPlaceholder?.parentNode) _uprootPlaceholder.parentNode.removeChild(_uprootPlaceholder);
      if (_uprootCard?.parentNode) _uprootCard.parentNode.removeChild(_uprootCard);
      _uprootPlaceholder = null; _uprootCard = null; _uprootDrag = null;
      const w = screenToWorld(e.clientX, e.clientY);
      plantAt(w.x, w.y);
    }
    cv.style.cursor = 'grab';
    return;
  }
  if (holdState) {
    holdState = null;
    cv.style.cursor = 'grab';
    return;
  }
  if (isPanning) { isPanning = false; cv.style.cursor = 'grab'; }
});

document.addEventListener('mousemove', e => {
  if (_uprootDrag) {
    // create tooltip on first move
    if (!_uprootDragTip) {
      const seed = seeds.find(s => s.id === _uprootDrag.seedId);
      if (seed) {
        const garden = tdGetGarden();
        const task = garden?.tasks.find(t => t.id === seed.id);
        const _tc = task ? tdTaskColor(task) : null;
        const _dotCss = _tc
          ? `display:inline-block;width:9px;height:9px;border-radius:50%;background:${_tc};flex-shrink:0`
          : `display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--border2);flex-shrink:0`;
        _uprootDragTip = document.createElement('div');
        _uprootDragTip.className = 'tt on';
        _uprootDragTip.innerHTML = `<div style="display:flex;align-items:center;gap:0.4rem">
          <span style="${_dotCss}"></span>
          <span class="ttl" style="margin:0">${seed.title}</span>
          <span style="font-size:0.48rem;color:var(--faint);flex-shrink:0">${task?.size||'medium'}</span>
        </div>`;
        document.body.appendChild(_uprootDragTip);
      }
    }
    if (_uprootDragTip) {
      _uprootDragTip.style.left = (e.clientX + 14) + 'px';
      _uprootDragTip.style.top = (e.clientY + 16) + 'px';
    }
    // check if over canvas or tray
    const cvRect = cv.getBoundingClientRect();
    const overCanvas = e.clientX >= cvRect.left && e.clientX <= cvRect.right &&
                       e.clientY >= cvRect.top && e.clientY <= cvRect.bottom;
    if (overCanvas) {
      const w = screenToWorld(e.clientX, e.clientY);
      const seed = seeds.find(s => s.id === _uprootDrag.seedId);
      if (seed) _tdDragPreview = { seed, x: w.x, y: w.y };
      mouseX = w.x; mouseY = w.y;
    } else {
      _tdDragPreview = null;
      // move placeholder to closest position in list
      if (_uprootPlaceholder) {
        const scroll = document.getElementById('tray-scroll');
        const cards = [...scroll.querySelectorAll('.todo-task:not([style*="display: none"])')];
        let closest = null, closestDist = Infinity;
        cards.forEach(c => {
          const r = c.getBoundingClientRect();
          const mid = r.top + r.height / 2;
          const dist = Math.abs(e.clientY - mid);
          if (dist < closestDist) { closestDist = dist; closest = c; }
        });
        if (closest) {
          const cr = closest.getBoundingClientRect();
          const before = e.clientY < cr.top + cr.height / 2;
          if (before) scroll.insertBefore(_uprootPlaceholder, closest);
          else scroll.insertBefore(_uprootPlaceholder, closest.nextSibling);
        }
      }
    }
    return;
  }
  if (holdState) {
    const dx = e.clientX - holdState.screenX, dy = e.clientY - holdState.screenY;
    // slight movement while holding is fine — only cancel if large (accidental pan)
    if (Math.hypot(dx,dy) > 24) {
      holdState = null;
      isPanning = true;
      panStart = { x: e.clientX, y: e.clientY };
      camStart = { x: cam.x, y: cam.y };
      cv.style.cursor = 'grabbing';
    }
    return;
  }
  if (!isPanning) return;
  const dx = (e.clientX - panStart.x) / cam.zoom;
  const dy = (e.clientY - panStart.y) / cam.zoom;
  cam.x = camStart.x - dx;
  cam.y = camStart.y - dy;
  clampCam();
});

function uprootPlant(p) {
  const idx = planted.indexOf(p);
  if (idx === -1) return;
  planted.splice(idx, 1);
  plantChains.delete(p.seed);
  saveGarden();
  spawnConfetti(p.x, p.y);

  // mark task undone so it becomes a seed
  const garden = tdGetGarden();
  if (garden) {
    const task = garden.tasks.find(t => t.id === p.id);
    if (task) { task.done = false; tdSave(); }
  }
  // rebuild tray so seeds array and DOM card exist
  tdApplyGarden();
  // set selectedSeed so plantAt works if user drops on canvas
  selectedSeed = seeds.find(s => s.id === p.id) || null;

  // immediately hide the card and show a placeholder gap
  const scroll = document.getElementById('tray-scroll');
  const card = scroll?.querySelector(`.todo-task[data-tid="${p.id}"]`);
  if (card) {
    const rect = card.getBoundingClientRect();
    const ph = document.createElement('div');
    ph.className = 'todo-task-placeholder';
    ph.style.height = rect.height + 'px';
    card.parentNode.insertBefore(ph, card);
    card.style.display = 'none';
    _uprootPlaceholder = ph;
    _uprootCard = card;
  }
}

// ── zoom scroll removed — pan only ──

// reset cam button
function resetCam(){ cam.x=0; cam.y=0; clampCam(); }

// ── Mouse tracking (world-aware) ──
document.addEventListener('mousemove', e => {
  // always track world position for face eyes
  const w = screenToWorld(e.clientX, e.clientY);
  mouseX = w.x; mouseY = w.y;

  if (selectedSeed) {
    seedCursor.style.left = e.clientX + 'px';
    seedCursor.style.top  = e.clientY + 'px';
    const rc = cv.getBoundingClientRect();
    const over = e.clientX>=rc.left && e.clientX<=rc.right && e.clientY>=rc.top && e.clientY<=rc.bottom;
    seedCursor.style.opacity = over ? '1' : '0.5';
  }
});

// ── Canvas click ──
cv.addEventListener('click', e => {
  if (isPanning) return;
  if (!selectedSeed) return;
  const w = screenToWorld(e.clientX, e.clientY);
  plantAt(w.x, w.y);
});

// ── Drag-to-canvas: accept task drops from tray ──
// Use a separate preview system — don't touch selectedSeed during drag
let _tdDraggingId   = null;  // id of task currently being dragged
let _tdDragPreview  = null;  // { seed, x, y } world-space preview while dragging over canvas

// Canvas drag-to-plant is handled by pointer events in buildTray() task cards


// ── Tooltip + hover wiggle ──
cv.addEventListener('mousemove', e => {
  // always update world mouse pos so eyes track cursor
  const w = screenToWorld(e.clientX, e.clientY);
  mouseX = w.x; mouseY = w.y;

  if (selectedSeed || isPanning) { ttEl.classList.remove('on'); return; }
  const BASE = Math.min(cv.width, cv.height) * 0.16 / cam.zoom;
  let hit = null;
  for (const p of planted) {
    const rr = srng(p.seed);
    const _ssz = {small:0.55,medium:1.0,large:1.7}[p.size||'medium']||1.0;
    const maxH = BASE*(PH[p.priority]||0.54)*_ssz*(0.8+rr()*0.4);
    const headBase = BASE*0.54*(0.8+rr()*0.4);
    const headR = headBase*0.22;
    const elapsed = (Date.now()-p.plantedAt)/1000;
    const stemH = maxH * pop(Math.min(1, elapsed/0.40));
    if (Math.hypot(w.x-p.x, w.y-(p.y-stemH)) < headR*1.6) { hit=p; break; }
  }
  // trigger spring kick on new hover
  if (hit && hit !== hoveredPlant) {
    hoveredPlant = hit;
    kickSpring(hit, 0.6 + Math.random() * 0.9); // random strength + random dir inside kickSpring
  } else if (!hit) {
    hoveredPlant = null;
  }
  if (hit) {
    const _hitTaskColor = hit.color ? (()=>{const c=TD_COLORS?.find(c=>c.id===hit.color);return c?.hex||null;})() : null;
    const _dotStyle = _hitTaskColor
      ? `display:inline-block;width:9px;height:9px;border-radius:50%;background:${_hitTaskColor};flex-shrink:0`
      : `display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--border2);flex-shrink:0`;
    const _sizeLabel = hit.size || 'medium';
    ttEl.innerHTML = `<div style="display:flex;align-items:center;gap:0.4rem">
        <span style="${_dotStyle}"></span>
        <span class="ttl" style="margin:0">${hit.title}</span>
        <span style="font-size:0.48rem;color:var(--faint);flex-shrink:0">${_sizeLabel}</span>
      </div>`;
    ttEl.classList.add('on');
    ttEl.style.left = Math.min(e.clientX+14,window.innerWidth-220)+'px';
    ttEl.style.top  = (e.clientY-12)+'px';
  } else { ttEl.classList.remove('on'); }
});
cv.addEventListener('mouseleave', () => { ttEl.classList.remove('on'); mouseX=-999; mouseY=-999; });
cv.style.cursor = 'grab';

// ── Plant at position ──
function plantAt(x, y) {
  if (!selectedSeed) return;
  selectedSeed.planted = true;
  planted.push({ ...selectedSeed, x, y, plantedAt: Date.now() });
  lastPlantTime = Date.now();
  lastPlantPos  = { x, y };
  spawnKick(planted[planted.length - 1]);
  const newPlant = planted[planted.length - 1];
  setTimeout(() => kickSpring(newPlant, 0.5, 1), 420);
  document.getElementById('n-planted').textContent = planted.length;
  spawnConfetti(x, y);
  playPlantSound();

  // Mark the task as done + play complete animation
  const garden = tdGetGarden();
  if (garden) {
    const task = garden.tasks.find(t => t.id === selectedSeed.id);
    if (task) {
      task.done = true; tdSave();
      const taskId = selectedSeed.id;
      cancelPlanting();
      saveGarden(); updateDropHint();
      const card = document.querySelector(`.todo-task[data-tid="${taskId}"]`);
      if (card) {
        card.classList.add('td-completing');
        const rect = card.getBoundingClientRect();
        const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
        for (let i=0; i<8; i++) spawnConfettiScreen(cx + (Math.random()-0.5)*rect.width*0.8, cy + (Math.random()-0.5)*rect.height*0.8);
        setTimeout(() => { buildTray(); }, 560);
      } else {
        buildTray();
      }
      return;
    }
  }

  cancelPlanting();
  saveGarden();
  buildTray();
  updateDropHint();
}

function selectSeed(seed, el) {
  if (seed.planted) return;
  if (selectedSeed === seed) { cancelPlanting(); return; }
  clearSeedSelection();
  selectedSeed = seed;
  el.classList.add('selected');
  const badge = document.createElement('div');
  badge.className = 'sel-badge'; badge.textContent = 'selected';
  el.appendChild(badge);
  document.getElementById('garden').classList.add('planting');
  document.getElementById('plant-banner').classList.add('on');
  document.getElementById('banner-dot').style.background = ownerColor(seed.owner);
  document.getElementById('banner-txt').textContent = `planting: ${seed.title.substring(0,28)}${seed.title.length>28?'…':''}`;
  seedCursor.classList.add('on');
  seedCursor.classList.add('pulse');
  setStatus('ok', `🌱 click anywhere on the garden to plant`);
}

function clearSeedSelection() {
  document.querySelectorAll('.seed.selected').forEach(el => {
    el.classList.remove('selected');
    const b = el.querySelector('.sel-badge'); if (b) b.remove();
  });
}

// Close garden dropdown when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('#tray-garden-section')) tdCloseGardenDropdown();
}, true);

// Close expanded task card when clicking outside
document.addEventListener('click', e => {
  if (_tdExpandedId && !e.target.closest('.todo-task')) {
    _tdExpandedId = null;
    buildTray();
  }
}, true);

function cancelPlanting() {
  selectedSeed  = null;
  _uprootDrag   = null;
  if (_uprootDragTip && _uprootDragTip.parentNode) _uprootDragTip.parentNode.removeChild(_uprootDragTip);
  _uprootDragTip = null;
  if (_uprootPlaceholder?.parentNode) _uprootPlaceholder.parentNode.removeChild(_uprootPlaceholder);
  if (_uprootCard) _uprootCard.style.display = '';
  _uprootPlaceholder = null; _uprootCard = null;
  _tdDragPreview = null;
  clearSeedSelection();
  document.getElementById('garden').classList.remove('planting');
  document.getElementById('plant-banner').classList.remove('on');
  seedCursor.classList.remove('on');
  seedCursor.classList.remove('pulse');
  mouseX = -999; mouseY = -999;
  cv.style.cursor = 'grab';
  updateDropHint();
}


// Task color palette — affects flower color
const TD_COLORS = [
  { id:'default', hex:null,      label:'Default' },
  { id:'red',     hex:'#fd7f7f', label:'Red'     },
  { id:'orange',  hex:'#fd9d49', label:'Orange'  },
  { id:'yellow',  hex:'#f0d146', label:'Yellow'  },
  { id:'green',   hex:'#67cf53', label:'Green'   },
  { id:'cyan',    hex:'#38b8a0', label:'Cyan'    },
  { id:'blue',    hex:'#7fb8fd', label:'Blue'    },
  { id:'purple',  hex:'#a37ffd', label:'Purple'  },
];

function tdTaskColor(task) {
  const c = TD_COLORS.find(c => c.id === task.color);
  return c?.hex || null;
}

function tdSetTaskColor(taskId, colorId) {
  const garden = tdGetGarden(); if (!garden) return;
  const task = garden.tasks.find(t => t.id === taskId); if (!task) return;
  task.color = colorId === 'default' ? null : colorId;
  const plant = planted.find(p => p.id === taskId);
  if (plant) { plant.color = task.color; saveGarden(); }
  tdSave(); buildTray();
}
function tdSetTaskSize(taskId, sizeId) {
  const garden = tdGetGarden(); if (!garden) return;
  const task = garden.tasks.find(t => t.id === taskId); if (!task) return;
  task.size = sizeId;
  const plant = planted.find(p => p.id === taskId);
  if (plant) { plant.size = sizeId; saveGarden(); }
  const seed = seeds.find(s => s.id === taskId);
  if (seed) seed.size = sizeId;
  tdSave(); buildTray();
}


// ── Garden progress bar ──
function tdUpdateProgressRing() {
  const garden = tdGetGarden();
  const row = document.getElementById('tray-progress-row');
  if (!row) return;
  if (!garden || garden.tasks.length === 0) { row.style.display = 'none'; return; }
  row.style.display = 'block';

  const total = garden.tasks.length;
  const done  = garden.tasks.filter(t => t.done).length;
  const pct   = Math.round(done / total * 100);

  const pctEl = document.getElementById('tray-progress-pct');
  if (pctEl) pctEl.textContent = pct + '%';

  const todoChip = document.getElementById('prog-chip-todo');
  const doneChip = document.getElementById('prog-chip-done');
  if (todoChip) todoChip.textContent = (total - done);
  if (doneChip) doneChip.textContent = done;

  const fill = document.getElementById('garden-progress-fill');
  if (fill) {
    fill.style.width = pct + '%';
    fill.style.background = done === total ? '#5ec45e' : 'var(--accent)';
  }
}

// ── Build tray ──
function buildTray() {
  const scroll = document.getElementById('tray-scroll');
  const addArea = document.getElementById('tray-add-area');

  const garden = tdGetGarden();

    // Update tabs + add area visibility
    const foot = document.getElementById('tray-foot-todo');
    if (foot) foot.style.display = garden ? 'flex' : 'none';

    document.getElementById('tray-tabs').style.display = garden ? 'flex' : 'none';
    addArea.style.display = (garden && _tdActiveTab === 'todo') ? 'flex' : 'none';

    scroll.innerHTML = '';

    if (!garden) {
      scroll.innerHTML = '<div style="text-align:center;color:var(--faint);font-size:0.62rem;padding:2rem 0.5rem;line-height:2">Select a garden<br>to get started</div>';
      const ns = document.getElementById('n-seeds'); if(ns) ns.textContent='0';
      const np = document.getElementById('n-planted'); if(np) np.textContent=planted.length;
      return;
    }

    if (_tdActiveTab === 'done') {
      const doneTasks = garden.tasks.filter(t => t.done);
      if (!doneTasks.length) {
        scroll.innerHTML = '<div style="text-align:center;color:var(--faint);font-size:0.62rem;padding:2rem 0.5rem;line-height:2">No done tasks yet —<br>plant a task to complete it</div>';
      } else {
        doneTasks.forEach(task => {
          const isPlanted = planted.some(p => p.id === task.id);
          const dotColor  = tdTaskColor(task) || '#5ec45e';
          const el = document.createElement('div');
          el.className = 'todo-done-item';
          el.innerHTML = `<div class="todo-done-dot" style="background:${dotColor}"></div><span style="flex:1">${task.title}</span><span style="font-size:0.5rem;color:var(--faint)">${isPlanted ? '🌱' : '✓'}</span>`;
          scroll.appendChild(el);
        });
      }
      const ns2 = document.getElementById('n-seeds'); if(ns2) ns2.textContent = seeds.length;
      const np2 = document.getElementById('n-planted'); if(np2) np2.textContent = planted.length;
      return;
    }

    // ── TODO TAB ──
    const todoTasks = garden.tasks.filter(t => !t.done);
    if (!todoTasks.length) {
      scroll.innerHTML = '<div style="text-align:center;color:var(--faint);font-size:0.62rem;padding:2rem 0.5rem;line-height:2">All done! 🎉<br>Check the Done tab</div>';
    }

    todoTasks.forEach((task, i) => {
      const isSelected  = selectedSeed?.id === task.id;
      const isNew       = _tdNewTaskIds.has(task.id);
      const taskColor   = tdTaskColor(task);
      const isExpanded  = _tdExpandedId === task.id;

      const isEditing = _tdEditingTaskId === task.id;
      const el = document.createElement('div');
      el.className = 'todo-task' + (isSelected ? ' selected' : '') + (isNew ? ' slide-in' : '');
      if (isNew) {
        el.style.animationDelay = (i * 0.04) + 's';
        el.addEventListener('animationend', () => el.classList.remove('slide-in'), { once: true });
      }
      if (taskColor) el.style.setProperty('--task-accent', taskColor);
      el.dataset.tid  = task.id;
      el.dataset.tidx = i;

      // color dot (shows task color, default grey if none)
      const dotStyle = taskColor ? `background:${taskColor}` : 'background:var(--border2,#c8d4c0)';

      // Title area: either editing input or static text
      const titleHtml = isEditing
        ? `<input id="td-edit-task-input" class="todo-task-title-input" value="${task.title.replace(/"/g,'&quot;')}" onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter')tdConfirmEditTask('${task.id}');if(event.key==='Escape')tdCancelEditTask()"/>`
        : `<div class="todo-task-title">${task.title}</div>`;

      el.innerHTML = `
        <div class="todo-task-row">
          <span class="todo-drag-handle">⠿</span>
          <div class="todo-color-dot" style="${dotStyle}"></div>
          <div style="flex:1;min-width:0">
            ${titleHtml}
          </div>
          ${isEditing ? `
            <button class="tsh-btn" onclick="event.stopPropagation();tdConfirmEditTask('${task.id}')" style="color:var(--accent);font-size:0.75rem" title="Save">✓</button>
            <button class="tsh-btn" onclick="event.stopPropagation();tdCancelEditTask()" title="Cancel">✕</button>
          ` : `
            <button class="todo-edit-icon" data-tid="${task.id}" title="Edit">✎</button>
            <span class="todo-chevron" style="color:var(--faint);font-size:0.6rem;flex-shrink:0;transition:transform 0.18s;transform:rotate(${isExpanded?'90':'0'}deg);pointer-events:none">▶</span>
            <button class="todo-del" title="Delete">✕</button>
          `}
        </div>
        ${isExpanded && !isEditing ? `
        <div class="todo-expand">
          <div class="todo-expand-label">Flower color</div>
          <div class="todo-color-row">
            ${TD_COLORS.map(c => `
              <div class="todo-color-swatch ${(!task.color && c.id==='default') || task.color===c.id ? 'active':''}"
                style="${c.hex ? `background:${c.hex}` : 'background:var(--border2);border-style:dashed'}"
                title="${c.label}"
                data-color="${c.id}"></div>
            `).join('')}
          </div>
          <div class="todo-expand-label" style="margin-top:0.45rem">Flower size</div>
          <div class="todo-size-row">
            ${['small','medium','large'].map(sz => `
              <button class="todo-size-btn ${(task.size||'medium')===sz ? 'active':''}" data-size="${sz}">${sz}</button>
            `).join('')}
          </div>
          <button class="todo-plant-btn" data-tid="${task.id}">🌱 Plant</button>
        </div>` : ''}`;

      // Focus edit input
      if (isEditing) {
        setTimeout(() => { const inp = document.getElementById('td-edit-task-input'); if(inp) { inp.focus(); inp.select(); } }, 50);
      }

      // edit icon in main row
      if (!isEditing) {
        const editIcon = el.querySelector('.todo-edit-icon');
        if (editIcon) editIcon.addEventListener('click', e => { e.stopPropagation(); tdStartEditTask(task.id); });
      }

      if (isExpanded && !isEditing) {
        // size buttons
        el.querySelectorAll('.todo-size-btn').forEach(btn => {
          btn.addEventListener('click', e => {
            e.stopPropagation();
            tdSetTaskSize(task.id, btn.dataset.size);
          });
        });
        // plant button — sync color + size then enter plant mode
        el.querySelector('.todo-plant-btn').addEventListener('click', e => {
          e.stopPropagation();
          const seed = seeds.find(s => s.id === task.id);
          if (!seed) return;
          seed.color   = task.color   || null;
          seed.size    = task.size    || 'medium';
          seed.dueDate = task.dueDate || null;
          selectSeed(seed, el);
        });
      }

      // color swatches
      el.querySelectorAll('.todo-color-swatch').forEach(sw => {
        sw.addEventListener('click', e => {
          e.stopPropagation();
          tdSetTaskColor(task.id, sw.dataset.color);
        });
      });

      // click card = expand/collapse (debounced to not fire on dblclick)
      let _taskClickTimer = null;
      el.addEventListener('click', e => {
        if (isEditing || didDrag) return;
        if (e.target.closest('.todo-del') || e.target.closest('.todo-color-swatch') || e.target.closest('.todo-plant-btn') || e.target.closest('.todo-size-btn') || e.target.closest('.todo-edit-icon')) return;
        if (_taskClickTimer) { clearTimeout(_taskClickTimer); _taskClickTimer = null; return; }
        _taskClickTimer = setTimeout(() => {
          _taskClickTimer = null;
          _tdExpandedId = (_tdExpandedId === task.id) ? null : task.id;
          buildTray();
        }, 220);
      });

      // double-click card = edit title
      el.addEventListener('dblclick', e => {
        if (isEditing) return;
        if (_taskClickTimer) { clearTimeout(_taskClickTimer); _taskClickTimer = null; }
        e.stopPropagation();
        tdStartEditTask(task.id);
      });

      if (!isEditing) {
        el.querySelector('.todo-del')?.addEventListener('click', e => {
          e.stopPropagation(); tdDeleteTask(task.id);
        });
      }

      // pointer-based drag reorder (whole card) + drag-to-canvas planting
      let pointerDown = false, startX = 0, startY = 0, didDrag = false;
      let _placeholder = null, _origRect = null, _overCanvas = false, _dragTip = null;

      function _cleanupDrag() {
        el.classList.remove('dragging');
        el.style.cssText = '';
        scroll.querySelectorAll('.slide-in').forEach(c => c.classList.remove('slide-in'));
        if (_placeholder && _placeholder.parentNode) _placeholder.parentNode.removeChild(_placeholder);
        if (_dragTip && _dragTip.parentNode) _dragTip.parentNode.removeChild(_dragTip);
        _placeholder = null; _origRect = null; _overCanvas = false; _dragTip = null;
        _tdDraggingId = null; _tdDragPreview = null;
        cv.style.cursor = 'grab';
        pointerDown = false; didDrag = false;
      }

      el.addEventListener('pointerdown', e => {
        if (isEditing || isExpanded || e.button !== 0) return;
        if (e.target.closest('.todo-del') || e.target.closest('.todo-edit-icon')) return;
        pointerDown = true; didDrag = false;
        startX = e.clientX; startY = e.clientY;
        el.setPointerCapture(e.pointerId);
      });
      el.addEventListener('pointermove', e => {
        if (!pointerDown) return;
        if (!didDrag && Math.abs(e.clientY - startY) < 8) return;
        if (!didDrag) {
          didDrag = true;
          _tdDraggingId = task.id;
          const _ds = seeds.find(s => s.id === task.id);
          if (_ds) { _ds.color = task.color || null; _ds.size = task.size || 'medium'; _ds.dueDate = task.dueDate || null; }
          _origRect = el.getBoundingClientRect();
          // create placeholder gap
          _placeholder = document.createElement('div');
          _placeholder.className = 'todo-task-placeholder';
          _placeholder.style.height = _origRect.height + 'px';
          el.parentNode.insertBefore(_placeholder, el);
          // float the card
          el.classList.add('dragging');
          el.classList.remove('slide-in');
          el.style.width = _origRect.width + 'px';
          el.style.left = _origRect.left + 'px';
          el.style.top = _origRect.top + 'px';
        }
        // check if cursor is over canvas
        const cvRect = cv.getBoundingClientRect();
        _overCanvas = e.clientX >= cvRect.left && e.clientX <= cvRect.right &&
                      e.clientY >= cvRect.top && e.clientY <= cvRect.bottom;

        if (_overCanvas) {
          // hide the full card, show a mini tooltip-style preview
          el.style.display = 'none';
          if (!_dragTip) {
            const _tc = tdTaskColor(task);
            const _dotCss = _tc
              ? `display:inline-block;width:9px;height:9px;border-radius:50%;background:${_tc};flex-shrink:0`
              : `display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--border2);flex-shrink:0`;
            _dragTip = document.createElement('div');
            _dragTip.className = 'tt on';
            _dragTip.innerHTML = `<div style="display:flex;align-items:center;gap:0.4rem">
              <span style="${_dotCss}"></span>
              <span class="ttl" style="margin:0">${task.title}</span>
              <span style="font-size:0.48rem;color:var(--faint);flex-shrink:0">${task.size||'medium'}</span>
            </div>`;
            document.body.appendChild(_dragTip);
          }
          _dragTip.style.left = (e.clientX + 14) + 'px';
          _dragTip.style.top = (e.clientY + 16) + 'px';
          // show canvas glow preview
          const w = screenToWorld(e.clientX, e.clientY);
          const seed = seeds.find(s => s.id === _tdDraggingId);
          if (seed) _tdDragPreview = { seed, x: w.x, y: w.y };
          mouseX = w.x; mouseY = w.y;
        } else {
          // back over tray — show full card, hide tip
          if (_dragTip) { _dragTip.parentNode?.removeChild(_dragTip); _dragTip = null; }
          el.style.display = '';
          el.style.transform = 'scale(0.97)';
          el.style.left = (_origRect.left + (e.clientX - startX)) + 'px';
          el.style.top = (_origRect.top + (e.clientY - startY)) + 'px';
          el.style.opacity = '0.92';
          _tdDragPreview = null;
          // move placeholder to closest position
          const cards = [...scroll.querySelectorAll('.todo-task:not(.dragging)')];
          let closest = null, closestDist = Infinity;
          cards.forEach(c => {
            const r = c.getBoundingClientRect();
            const mid = r.top + r.height / 2;
            const dist = Math.abs(e.clientY - mid);
            if (dist < closestDist) { closestDist = dist; closest = c; }
          });
          if (closest && _placeholder) {
            const cr = closest.getBoundingClientRect();
            const before = e.clientY < cr.top + cr.height / 2;
            if (before) scroll.insertBefore(_placeholder, closest);
            else scroll.insertBefore(_placeholder, closest.nextSibling);
          } else if (_placeholder && !closest) {
            // no other cards — just keep placeholder where it is
            scroll.appendChild(_placeholder);
          }
        }
      });
      el.addEventListener('pointerup', e => {
        if (!pointerDown || !didDrag) { pointerDown = false; return; }
        if (_overCanvas) {
          // plant on canvas
          const seed = seeds.find(s => s.id === task.id);
          if (seed) {
            selectedSeed = seed;
            const w = screenToWorld(e.clientX, e.clientY);
            _cleanupDrag();
            plantAt(w.x, w.y);
            return;
          }
        }
        // reorder: put card where placeholder is
        if (_placeholder && _placeholder.parentNode) {
          _placeholder.parentNode.insertBefore(el, _placeholder);
        }
        // read new order from DOM
        const newOrder = [...scroll.querySelectorAll('.todo-task[data-tid]')].map(c => c.dataset.tid);
        const undone = garden.tasks.filter(t => !t.done);
        const done = garden.tasks.filter(t => t.done);
        const reordered = newOrder.map(id => undone.find(t => t.id === id)).filter(Boolean);
        garden.tasks = [...reordered, ...done];
        tdSave();
        _cleanupDrag();
      });
      // safety: if pointer capture is lost, clean up
      el.addEventListener('lostpointercapture', () => {
        if (didDrag) {
          if (_placeholder && _placeholder.parentNode) {
            _placeholder.parentNode.insertBefore(el, _placeholder);
          }
          const newOrder = [...scroll.querySelectorAll('.todo-task[data-tid]')].map(c => c.dataset.tid);
          const undone = garden.tasks.filter(t => !t.done);
          const done = garden.tasks.filter(t => t.done);
          const reordered = newOrder.map(id => undone.find(t => t.id === id)).filter(Boolean);
          garden.tasks = [...reordered, ...done];
          tdSave();
          _cleanupDrag();
        }
      });

      scroll.appendChild(el);
    });

    // clear new-task IDs after this build cycle (slide-in animation started)
    if (_tdNewTaskIds.size) setTimeout(() => _tdNewTaskIds.clear(), 50);

    const ns3 = document.getElementById('n-seeds'); if(ns3) ns3.textContent = seeds.length;
    const np3 = document.getElementById('n-planted'); if(np3) np3.textContent = planted.length;
    tdUpdateProgressRing();
}


// ══════════════════════════════════════════════════════
// PLAYFUL SYSTEMS
// ══════════════════════════════════════════════════════

// ── CANVAS CONFETTI — per plant celebration ──
const confettiParticles = [];
const CONFETTI_COLORS = ['#fd7f7f','#7fb8fd','#67cf53','#a37ffd','#f0d146','#38b8a0','#fd9d49','#7878d4','#f9f871','#ff9f7f'];

function spawnConfetti(wx, wy) {
  for (let i = 0; i < 28; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.8 + Math.random() * 3.5;
    confettiParticles.push({
      x: wx, y: wy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3.5,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.28,
      size: 4 + Math.random() * 7,
      shape: Math.random() < 0.5 ? 'rect' : 'circle',
      col: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      life: 1.0,
      decay: 0.012 + Math.random() * 0.01,
      gravity: 0.12
    });
  }
}

// spawn confetti at screen coords (converts to world)
function spawnConfettiScreen(sx, sy) {
  const w = screenToWorld(sx, sy);
  spawnConfetti(w.x, w.y);
}

// Esc or click selected task = deselect
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && selectedSeed) { cancelPlanting(); }
});

function updateAndDrawConfetti() {
  for (let i = confettiParticles.length - 1; i >= 0; i--) {
    const c = confettiParticles[i];
    c.x += c.vx; c.y += c.vy;
    c.vy += c.gravity; c.vx *= 0.97;
    c.rot += c.rotV;
    c.life -= c.decay;
    if (c.life <= 0) { confettiParticles.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = Math.min(1, c.life * 1.5);
    ctx.translate(c.x, c.y); ctx.rotate(c.rot);
    ctx.fillStyle = c.col;
    if (c.shape === 'rect') ctx.fillRect(-c.size/2, -c.size/4, c.size, c.size/2);
    else { ctx.beginPath(); ctx.arc(0, 0, c.size/2, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
  }
}

// ── STEM CHAIN PHYSICS — multi-segment rope simulation ──
// Each plant gets N segments. Each segment stores angle relative to parent.
const CHAIN_SEGS = 5; // number of stem segments
const plantChains = new Map(); // seed → array of { angle, vel }

// last plant time for surprise reaction
let lastPlantTime = 0;
let lastPlantPos  = { x: 0, y: 0 };
let hoveredPlant  = null;

function getChain(p) {
  if (!plantChains.has(p.seed)) {
    plantChains.set(p.seed, Array.from({length: CHAIN_SEGS}, () => ({ angle: 0, vel: 0 })));
  }
  return plantChains.get(p.seed);
}

// Step chain physics every frame
function stepSprings() {
  const stiffness = 280;
  const damping   = 9;
  const dt        = 0.016;
  for (const [key, chain] of plantChains) {
    let anyActive = false;
    for (const seg of chain) {
      if (Math.abs(seg.angle) > 0.00015 || Math.abs(seg.vel) > 0.00015) anyActive = true;
    }
    if (!anyActive) continue;
    for (let i = 0; i < chain.length; i++) {
      const seg = chain[i];
      // segments higher up (tip) are looser — lower stiffness, less damping
      const tipFactor = (i + 1) / chain.length; // 0.2 … 1.0
      const k = stiffness * (1 - tipFactor * 0.55); // base segs stiffer
      const d = damping   * (1 - tipFactor * 0.4);
      const force = -k * seg.angle - d * seg.vel;
      seg.vel   += force * dt;
      seg.angle += seg.vel * dt;
      if (Math.abs(seg.angle) < 0.00015 && Math.abs(seg.vel) < 0.00015) {
        seg.angle = 0; seg.vel = 0;
      }
    }
  }
}

// Kick: propagate a wave through the chain from tip to base with delay
// dir: +1 or -1, strength multiplier
function kickSpring(p, strength, dir) {
  const chain = getChain(p);
  strength = strength || 1;
  dir = dir || (Math.random() < 0.5 ? 1 : -1);
  // random per-hover variation: strength 0.7–1.4, random frequency feel
  const freq = 0.8 + Math.random() * 0.7; // changes how segments spread
  chain.forEach((seg, i) => {
    const delay = i * 14 * freq;
    setTimeout(() => {
      // tip segments get more kick, base less — plus random jitter per segment
      const jitter = 1 + (Math.random() - 0.5) * 0.4;
      seg.vel = dir * strength * 18 * (1 - i / chain.length * 0.45) * jitter;
    }, delay);
  });
}

// Spawn wave: called once when plant is first placed.
// Kicks with a strong outward flick from BASE up to TIP — opposite order to hover
function spawnKick(p) {
  const chain = getChain(p);
  const dir = Math.random() < 0.5 ? 1 : -1;
  chain.forEach((seg, i) => {
    // base segs kick first (stem grows from bottom), then tip follows
    const delay = (CHAIN_SEGS - 1 - i) * 22;
    setTimeout(() => {
      seg.vel = dir * 28 * ((i + 1) / chain.length); // tip gets more amplitude
    }, delay);
  });
}

// Returns array of {x,y} world-offset points along the stem
// baseX=0, baseY=0, tipRelY=-stemH
// Each segment is influenced by its spring angle + ambient sway
function chainPoints(p, stemH, ambientSway) {
  const chain = getChain(p);
  const segH = stemH / CHAIN_SEGS;
  const pts = [{ x: 0, y: 0 }]; // base

  let cumAngle = 0;
  let cx = 0, cy = 0;
  for (let i = 0; i < CHAIN_SEGS; i++) {
    // Each segment's world angle = ambient sway contribution + its own spring angle
    // Base segments feel more ambient sway; tip segments feel more spring
    const swayShare = ambientSway * (1 - i / CHAIN_SEGS * 0.3);
    cumAngle += chain[i].angle + (swayShare - (i > 0 ? chain[i-1].angle : 0)) * 0.12;
    const totalAngle = swayShare + chain[i].angle;
    cx += Math.sin(totalAngle) * segH;
    cy -= Math.cos(totalAngle) * segH;
    pts.push({ x: cx, y: cy });
  }
  return pts;
}

// ── PLANTING SOUND — random pitch each time ──
let audioCtx = null;
// Pentatonic-ish base frequencies for variety
const NOTE_BASES = [196, 220, 246, 261, 294, 330, 349, 392, 440, 494];

function playPlantSound() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now  = audioCtx.currentTime;
    const base = NOTE_BASES[Math.floor(Math.random() * NOTE_BASES.length)];
    const top  = base * (2.8 + Math.random() * 1.2); // random sweep range

    // main boing
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(base, now);
    osc.frequency.exponentialRampToValueAtTime(top, now + 0.1 + Math.random()*0.06);
    gain.gain.setValueAtTime(0.16, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.32);
    osc.start(now); osc.stop(now + 0.35);

    // harmonic shimmer at 2x, slightly delayed
    const osc2  = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.connect(gain2); gain2.connect(audioCtx.destination);
    osc2.type = 'sine';
    const delay = 0.03 + Math.random()*0.04;
    osc2.frequency.setValueAtTime(base * 2, now + delay);
    osc2.frequency.exponentialRampToValueAtTime(top * 1.5, now + delay + 0.15);
    gain2.gain.setValueAtTime(0.08, now + delay);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.38);
    osc2.start(now + delay); osc2.stop(now + delay + 0.4);
  } catch(e) {}
}

// ── Auto-restore or show login ──
(function tryRestore() {
  const session = loadSession();
  if (session?.type === 'todo') {
    sessionType = 'todo';
    loginTodo();
    return;
  }
  document.getElementById('login-screen').style.display = 'flex';
})();
